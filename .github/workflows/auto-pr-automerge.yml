name: Auto PR And Auto-Merge

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

concurrency:
  group: auto-pr-automerge-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  upsert-pr-and-enable-automerge:
    if: ${{ github.event.repository.fork == false && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Upsert Pull Request
        id: upsert
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTO_PR_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = context.ref.replace('refs/heads/', '');
            const base = 'main';

            if (head === base) {
              core.info('head is main, skip');
              return;
            }

            const headRef = `${owner}:${head}`;
            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: headRef,
              base,
              per_page: 100,
            });

            let pr;
            if (existing.length > 0) {
              pr = existing[0];
              core.info(`existing PR found #${pr.number} ${pr.html_url}`);
            } else {
              const commit = await github.rest.repos.getCommit({ owner, repo, ref: head });
              const firstLine = String(commit.data.commit.message || '').split('\n')[0].trim();
              const title = firstLine || `chore: merge ${head} into main`;
              const body = [
                'Automated PR created by workflow.',
                '',
                `- branch: \`${head}\``,
                '- target: `main`',
                '- auto-merge: enabled when required checks are green',
              ].join('\n');

              const created = await github.rest.pulls.create({
                owner,
                repo,
                head,
                base,
                title,
                body,
                maintainer_can_modify: true,
              });
              pr = created.data;
              core.info(`created PR #${pr.number} ${pr.html_url}`);
            }

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_node_id', pr.node_id);
            core.setOutput('pr_url', pr.html_url);

      - name: Enable Auto-Merge
        if: ${{ steps.upsert.outputs.pr_node_id != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTO_PR_TOKEN || github.token }}
          script: |
            const prNodeId = '${{ steps.upsert.outputs.pr_node_id }}';
            const prNumber = '${{ steps.upsert.outputs.pr_number }}';
            if (!prNodeId) {
              core.warning('missing PR node id, skip auto-merge');
              return;
            }

            try {
              await github.graphql(
                `mutation($pr: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pr,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest {
                      number
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }`,
                { pr: prNodeId },
              );
              core.info(`auto-merge enabled for PR #${prNumber}`);
            } catch (error) {
              core.warning(`auto-merge enable skipped: ${error.message}`);
              core.warning('Check repository setting: General -> Pull Requests -> Allow auto-merge');
              core.warning('Also verify branch protection required checks/review policy.');
            }
