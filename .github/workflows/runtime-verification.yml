name: Runtime Verification

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  schedule:
    - cron: "55 23 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-verification:
    name: runtime-verification
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install CI Tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Install Dependencies
        run: npm ci

      - name: Prepare Local Env For CI
        run: |
          cp .env.local.example .env.local
          internal="$(openssl rand -hex 32)"
          signing="$(openssl rand -hex 32)"
          n8nkey="$(openssl rand -hex 32)"
          awk -v t1="$internal" -v t2="$signing" -v t3="$n8nkey" '
            /^INTERNAL_API_TOKEN=/{print "INTERNAL_API_TOKEN=" t1; next}
            /^INTERNAL_SIGNING_SECRET=/{print "INTERNAL_SIGNING_SECRET=" t2; next}
            /^N8N_ENCRYPTION_KEY=/{print "N8N_ENCRYPTION_KEY=" t3; next}
            /^LLM_PROVIDER=/{print "LLM_PROVIDER=mock"; next}
            {print}
          ' .env.local > .env.local.tmp
          mv .env.local.tmp .env.local

      - name: Show Tool Versions
        run: |
          node -v
          npm -v
          docker --version
          docker compose version

      - name: Validate Agent Config
        run: npm run verify:config

      - name: Proxy Regression Tests
        run: npm run test:proxy

      - name: Runtime Smoke Proxy Verification
        run: bash scripts/verify/smoke-runtime.sh proxy

      - name: Runtime Smoke n8n Verification
        run: bash scripts/verify/smoke-runtime.sh n8n

      - name: Runtime Agent Worker Verification
        run: docker run --rm -v "$PWD/agent:/work" -w /work agent_workspace-nanoclaw-agent python -m unittest tests.test_main -v

      - name: Runtime Smoke Security Verification
        run: bash scripts/verify/smoke-runtime.sh security

      - name: Validate Event Contract
        run: npm run verify:event-contract

      - name: Security Baseline Verification
        run: npm run security:check-orchestration

      - name: Collect Runtime Logs
        if: always()
        run: |
          docker compose ps -a || true
          docker compose logs --tail=200 || true
